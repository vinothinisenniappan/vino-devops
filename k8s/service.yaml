apiVersion: v1
kind: Service
metadata:
  name: vino-devops-service
  namespace: vino-devops
  labels:
    app: vino-devops-app
spec:
  type: NodePort
  selector:
    app: vino-devops-app
  ports:
    - name: http
      protocol: TCP
      port: 80               # Service port
      targetPort: 3000        # Container port
      nodePort: 30080         # External access port (range: 30000-32767)
